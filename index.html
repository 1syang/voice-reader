<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Reader</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f0f0f0;
      color: #1a1a1a;
      min-height: 100vh;
    }

    #app {
      max-width: 860px;
      margin: 0 auto;
      padding: 32px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    h1 { font-size: 1.4rem; font-weight: 600; color: #222; }

    /* Tabs */
    .tabs { display: flex; gap: 2px; }
    .tab {
      padding: 8px 18px;
      border: 1px solid #ccc;
      background: #e8e8e8;
      cursor: pointer;
      border-bottom: none;
      border-radius: 6px 6px 0 0;
      font-size: 14px;
      color: #555;
      transition: background 0.15s;
    }
    .tab:hover { background: #ddd; }
    .tab.active { background: white; color: #1a1a1a; font-weight: 500; }

    .tab-panel {
      display: none;
      background: white;
      border: 1px solid #ccc;
      border-radius: 0 8px 8px 8px;
      padding: 20px;
    }
    .tab-panel.active { display: block; }

    /* Drop zone */
    #drop-zone {
      border: 2px dashed #ccc;
      border-radius: 8px;
      padding: 36px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    #drop-zone:hover, #drop-zone.over { border-color: #4a90e2; background: #f0f7ff; }
    #drop-zone p { color: #888; font-size: 14px; margin-bottom: 12px; }
    #drop-zone input { display: none; }

    /* URL row */
    .url-row { display: flex; gap: 8px; }
    .url-row input {
      flex: 1;
      padding: 9px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }
    .url-row input:focus { outline: none; border-color: #4a90e2; }
    .url-note { margin-top: 8px; font-size: 12px; color: #999; }

    /* Paste area */
    #paste-area {
      width: 100%;
      height: 140px;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      resize: vertical;
    }
    #paste-area:focus { outline: none; border-color: #4a90e2; }

    /* Buttons */
    button {
      padding: 8px 16px;
      border: 1px solid #ccc;
      border-radius: 6px;
      cursor: pointer;
      background: white;
      font-size: 14px;
      transition: background 0.15s, border-color 0.15s;
    }
    button:hover { background: #f5f5f5; }
    button.primary { background: #4a90e2; color: white; border-color: #4a90e2; }
    button.primary:hover { background: #357abd; border-color: #357abd; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    /* Text display */
    #text-display {
      background: white;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 20px 24px;
      min-height: 180px;
      max-height: 380px;
      overflow-y: auto;
      font-size: 16px;
      line-height: 1.75;
      scroll-behavior: smooth;
    }
    #text-display .empty { color: #aaa; font-style: italic; }

    .sentence {
      border-radius: 3px;
      padding: 1px 2px;
      transition: background 0.2s;
      cursor: pointer;
    }
    .sentence:hover { background: #f0f0f0; }
    .sentence.active { background: #fff3b0; }

    /* Controls */
    #controls {
      background: white;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 16px 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 14px 20px;
      align-items: center;
    }

    .ctrl { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #555; }
    .ctrl label { white-space: nowrap; }

    input[type=range] { width: 90px; accent-color: #4a90e2; cursor: pointer; }
    .val { font-size: 12px; color: #888; min-width: 26px; }

    #voice-select {
      padding: 6px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 13px;
      max-width: 240px;
    }

    .play-btns { display: flex; gap: 6px; margin-left: auto; }
    #btn-play { min-width: 72px; }

    /* Status */
    #status {
      font-size: 12px;
      color: #888;
      text-align: center;
      min-height: 18px;
    }
  </style>
</head>
<body>
<div id="app">
  <h1>Voice Reader</h1>

  <!-- Input tabs -->
  <div>
    <div class="tabs">
      <button class="tab active" data-tab="file">File</button>
      <button class="tab" data-tab="url">URL</button>
      <button class="tab" data-tab="paste">Paste</button>
    </div>

    <div id="tab-file" class="tab-panel active">
      <div id="drop-zone">
        <p>Drop a PDF, DOCX, or EPUB here</p>
        <button onclick="document.getElementById('file-input').click()">Choose file</button>
        <input type="file" id="file-input" accept=".pdf,.docx,.epub">
      </div>
    </div>

    <div id="tab-url" class="tab-panel">
      <div class="url-row">
        <input type="url" id="url-input" placeholder="https://example.com/article">
        <button class="primary" onclick="loadURL()">Load</button>
      </div>
      <p class="url-note">Uses allorigins.win as a CORS proxy — works on most public pages; paywalled sites won't work.</p>
    </div>

    <div id="tab-paste" class="tab-panel">
      <textarea id="paste-area" placeholder="Paste or type text here…"></textarea>
      <button class="primary" style="margin-top:10px" onclick="loadPaste()">Load text</button>
    </div>
  </div>

  <!-- Text display -->
  <div id="text-display"><span class="empty">No text loaded yet.</span></div>

  <!-- Controls -->
  <div id="controls">
    <div class="ctrl">
      <label>Voice</label>
      <select id="voice-select"><option>Loading…</option></select>
    </div>
    <div class="ctrl">
      <label>Rate</label>
      <input type="range" id="rate" min="0.5" max="2" step="0.1" value="1"
             oninput="document.getElementById('rate-val').textContent=this.value">
      <span class="val" id="rate-val">1</span>
    </div>
    <div class="ctrl">
      <label>Pitch</label>
      <input type="range" id="pitch" min="0.5" max="2" step="0.1" value="1"
             oninput="document.getElementById('pitch-val').textContent=this.value">
      <span class="val" id="pitch-val">1</span>
    </div>
    <div class="play-btns">
      <button class="primary" id="btn-play" onclick="play()">▶ Play</button>
      <button id="btn-pause" onclick="togglePause()" disabled>⏸ Pause</button>
      <button id="btn-stop" onclick="stop()" disabled>■ Stop</button>
    </div>
  </div>

  <div id="status">Ready</div>
</div>

<script>
// ── PDF.js worker ────────────────────────────────────────────────────────────
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── State ────────────────────────────────────────────────────────────────────
let sentences = [];
let voiceList  = [];
let currentIdx = 0;
let speaking   = false;
let paused     = false;

// ── Tabs ─────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
  });
});

// ── Drag & drop ──────────────────────────────────────────────────────────────
const dropZone = document.getElementById('drop-zone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('over');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
document.getElementById('file-input').addEventListener('change', e => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});

// ── File handler ─────────────────────────────────────────────────────────────
async function handleFile(file) {
  setStatus('Extracting text…');
  try {
    const ext = file.name.split('.').pop().toLowerCase();
    let text;
    if      (ext === 'pdf')  text = await extractPDF(file);
    else if (ext === 'docx') text = await extractDOCX(file);
    else if (ext === 'epub') text = await extractEPUB(file);
    else { setStatus('Unsupported format. Use PDF, DOCX, or EPUB.'); return; }
    loadText(text);
  } catch (err) {
    setStatus('Error: ' + err.message);
    console.error(err);
  }
}

async function extractPDF(file) {
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  const parts = [];
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    parts.push(content.items.map(it => it.str).join(' '));
  }
  return parts.join('\n');
}

async function extractDOCX(file) {
  const buf = await file.arrayBuffer();
  const result = await mammoth.extractRawText({ arrayBuffer: buf });
  return result.value;
}

async function extractEPUB(file) {
  const buf  = await file.arrayBuffer();
  const zip  = await JSZip.loadAsync(buf);
  const parser = new DOMParser();

  // Locate OPF via container.xml
  const containerXml = await zip.file('META-INF/container.xml').async('text');
  const containerDoc = parser.parseFromString(containerXml, 'application/xml');
  const opfPath = containerDoc.querySelector('rootfile').getAttribute('full-path');
  const opfDir  = opfPath.includes('/') ? opfPath.slice(0, opfPath.lastIndexOf('/') + 1) : '';

  // Parse OPF
  const opfXml = await zip.file(opfPath).async('text');
  const opf    = parser.parseFromString(opfXml, 'application/xml');

  // Build id → href manifest
  const manifest = {};
  opf.querySelectorAll('manifest item').forEach(item => {
    manifest[item.getAttribute('id')] = item.getAttribute('href');
  });

  // Extract text in spine order
  const parts = [];
  for (const itemref of opf.querySelectorAll('spine itemref')) {
    const href = manifest[itemref.getAttribute('idref')];
    if (!href) continue;
    const f = zip.file(opfDir + href) || zip.file(href);
    if (!f) continue;
    const html = await f.async('text');
    const doc  = parser.parseFromString(html, 'text/html');
    doc.querySelectorAll('script,style').forEach(el => el.remove());
    const chapterText = (doc.body || doc.documentElement).textContent || '';
    parts.push(chapterText);
  }
  return parts.join('\n\n');
}

// ── URL loader ───────────────────────────────────────────────────────────────
async function loadURL() {
  const url = document.getElementById('url-input').value.trim();
  if (!url) return;
  setStatus('Fetching…');
  try {
    const proxy = 'https://api.allorigins.win/get?url=' + encodeURIComponent(url);
    const res  = await fetch(proxy);
    const data = await res.json();
    const parser = new DOMParser();
    const doc  = parser.parseFromString(data.contents, 'text/html');
    doc.querySelectorAll('script,style,nav,header,footer,aside,[role=navigation],[role=complementary]').forEach(el => el.remove());
    const main = doc.querySelector('main, article, [role=main]') || doc.body || doc.documentElement;
    loadText(main.textContent);
  } catch (err) {
    setStatus('Fetch error: ' + err.message);
  }
}

// ── Paste loader ─────────────────────────────────────────────────────────────
function loadPaste() {
  const text = document.getElementById('paste-area').value.trim();
  if (!text) { setStatus('Nothing to load.'); return; }
  loadText(text);
}

// ── Text → display ────────────────────────────────────────────────────────────
function loadText(raw) {
  stop();
  sentences = splitSentences(raw.trim());
  if (!sentences.length) { setStatus('No readable text found.'); return; }
  currentIdx = 0;

  const display = document.getElementById('text-display');
  display.innerHTML = sentences
    .map((s, i) => `<span class="sentence" id="s${i}" onclick="clickSentence(${i})">${escHtml(s)} </span>`)
    .join('');

  setStatus(`Ready — ${sentences.length} sentence${sentences.length !== 1 ? 's' : ''}`);
}

function clickSentence(idx) {
  stop();
  currentIdx = idx;
  play();
}

function splitSentences(text) {
  // Normalize whitespace
  text = text.replace(/[ \t]+/g, ' ').replace(/\n{3,}/g, '\n\n').trim();
  const result = [];
  let start = 0;

  for (let i = 0; i < text.length; i++) {
    if ('.!?…'.includes(text[i])) {
      // Peek past any closing quotes/brackets
      let end = i + 1;
      while (end < text.length && '"\')»'.includes(text[end])) end++;
      // If followed by whitespace + capital (or end), split here
      if (end >= text.length ||
          (text[end] === ' ' && end + 1 < text.length && /[A-Z"'(]/.test(text[end + 1]))) {
        const s = text.slice(start, end).trim();
        if (s) result.push(s);
        start = end + 1;
        i = end;
      }
    }
    // Also split on double newlines (paragraph breaks)
    if (text[i] === '\n' && text[i + 1] === '\n') {
      const s = text.slice(start, i).trim();
      if (s) result.push(s);
      start = i + 2;
    }
  }
  const tail = text.slice(start).trim();
  if (tail) result.push(tail);
  return result.filter(s => s.length > 1);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlightSentence(idx) {
  document.querySelectorAll('.sentence').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('s' + idx);
  if (el) {
    el.classList.add('active');
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

// ── TTS ───────────────────────────────────────────────────────────────────────
function play() {
  if (!sentences.length) { setStatus('Load some text first.'); return; }
  if (paused) {
    paused = false;
    speechSynthesis.resume();
    // Chrome sometimes fails to resume — restart sentence if stalled
    setTimeout(() => {
      if (!speechSynthesis.speaking) speakCurrent();
    }, 250);
    document.getElementById('btn-pause').textContent = '⏸ Pause';
    return;
  }
  if (!speaking) {
    speaking = true;
    paused = false;
    speakCurrent();
    setButtonState(true);
  }
}

function speakCurrent() {
  if (!speaking || currentIdx >= sentences.length) {
    speaking = false;
    paused = false;
    setButtonState(false);
    setStatus('Done');
    document.querySelectorAll('.sentence').forEach(el => el.classList.remove('active'));
    return;
  }

  highlightSentence(currentIdx);
  setStatus(`Sentence ${currentIdx + 1} / ${sentences.length}`);

  const utter = new SpeechSynthesisUtterance(sentences[currentIdx]);
  const idx   = parseInt(document.getElementById('voice-select').value, 10);
  if (!isNaN(idx) && voiceList[idx]) utter.voice = voiceList[idx];
  utter.rate  = parseFloat(document.getElementById('rate').value);
  utter.pitch = parseFloat(document.getElementById('pitch').value);

  utter.onend = () => {
    if (speaking && !paused) {
      currentIdx++;
      speakCurrent();
    }
  };
  utter.onerror = e => {
    if (e.error !== 'interrupted') setStatus('Speech error: ' + e.error);
  };

  speechSynthesis.speak(utter);
}

function togglePause() {
  if (!speaking) return;
  const btn = document.getElementById('btn-pause');
  if (paused) {
    paused = false;
    speechSynthesis.resume();
    setTimeout(() => { if (!speechSynthesis.speaking) speakCurrent(); }, 250);
    btn.textContent = '⏸ Pause';
  } else {
    paused = true;
    speechSynthesis.pause();
    btn.textContent = '▶ Resume';
  }
}

function stop() {
  speaking = false;
  paused   = false;
  speechSynthesis.cancel();
  currentIdx = 0;
  document.getElementById('btn-pause').textContent = '⏸ Pause';
  document.querySelectorAll('.sentence').forEach(el => el.classList.remove('active'));
  setButtonState(false);
  if (sentences.length) setStatus(`Ready — ${sentences.length} sentences`);
}

function setButtonState(active) {
  document.getElementById('btn-play').disabled  = active;
  document.getElementById('btn-pause').disabled = !active;
  document.getElementById('btn-stop').disabled  = !active;
}

// ── Voices ────────────────────────────────────────────────────────────────────
function populateVoices() {
  const all    = speechSynthesis.getVoices();
  if (!all.length) return;
  const english = all.filter(v => v.lang.startsWith('en'));
  const rest    = all.filter(v => !v.lang.startsWith('en'));
  voiceList = [...english, ...rest];

  const sel = document.getElementById('voice-select');
  sel.innerHTML = '';
  voiceList.forEach((v, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `${v.name} (${v.lang})${v.default ? ' ★' : ''}`;
    if (v.default) opt.selected = true;
    sel.appendChild(opt);
  });
}

speechSynthesis.addEventListener('voiceschanged', populateVoices);
populateVoices();

// ── Helpers ───────────────────────────────────────────────────────────────────
function setStatus(msg) { document.getElementById('status').textContent = msg; }
</script>
</body>
</html>
